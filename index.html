<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChurchOrganizer</title>
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: #F2F6F3;
        color: #2D3748;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      #preloader {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #F2F6F3;
        color: #2D3748;
        z-index: 9999;
      }
      .preloader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        padding: 2.5rem 3rem;
        border-radius: 1rem;
        background: #FFFFFF;
        border: 1px solid #E2E8F0;
        box-shadow: 0 20px 40px rgba(45, 55, 72, 0.12);
      }
      .preloader-spinner,
      .button-spinner {
        width: 2rem;
        height: 2rem;
        border-radius: 50%;
        border: 3px solid rgba(20, 167, 74, 0.15);
        border-top-color: #14A74A;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      html[data-theme="dark"],
      html[data-theme="dark"] body { background: #0F1117; color: #E2E8F0; }
      html[data-theme="dark"] #preloader { background: #0F1117; color: #E2E8F0; }
      html[data-theme="dark"] .preloader-content {
        background: #1A1F2E;
        border-color: #2D3748;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <div class="preloader-content">
        <div class="preloader-spinner"></div>
        <p>Carregando...</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
